# -----------------------------------------------------------
# 🌐 PEER DISCOVERY + ROUTEUR
# -----------------------------------------------------------
upnp=1                 # Enable automatic port forwarding
natpmp=1               # Apple routers / NAT-PMP
dnsseed=1              # Enable DNS-based peer discovery
listenonion=1          # Support Tor hidden services

# -----------------------------------------------------------
# 🧾 LOGGING / DEBUG
# -----------------------------------------------------------
debug=0                # Verbose logging
logips=0               # Show peer IPs in log
logtimestamps=0        # Show timestamps

# -----------------------------------------------------------
# 📦 WALLETS / MINING
# -----------------------------------------------------------
fallbackfee=0.0001     # Fallback fee for transactions

# Enable wallet support (default)
# disablewallet=0
# gen=1                 # Enable CPU mining (if needed)
# keypool=100
# wallet=wallet.dat

# -----------------------------------------------------------
# 🔒 ACCESS CONTROL
# -----------------------------------------------------------
whitelist=127.0.0.1          # Allow RPC from localhost
whitelist=192.168.1.0/24     # Allow RPC from local network

# -----------------------------------------------------------
# ⚙️ PERFORMANCE
# -----------------------------------------------------------
dbcache=450                 # DB cache in MB
maxmempool=300              # Max mempool in MB
minrelaytxfee=0.00001000    # Minimum fee per KB to relay tx

