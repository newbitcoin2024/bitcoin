# -----------------------------------------------------------
# 📘 BASE CONFIGURATION
# -----------------------------------------------------------
server=1                # Enable server mode (RPC accessible)

# -----------------------------------------------------------
# ⚡ ZMQ (pour ckpool - notification instantanée des blocs)
# -----------------------------------------------------------
zmqpubhashblock=tcp://127.0.0.1:28332
zmqpubrawblock=tcp://127.0.0.1:28332
#reindex=1
txindex=1               # Build full transaction index for explorers

# -----------------------------------------------------------
# 🔐 RPC CONFIGURATION
# -----------------------------------------------------------
rpcbind=0.0.0.0    
rpcallowip=192.168.1.0/24    # Only allow RPC connections from localhost
rpcport=8332            # Port for RPC server

rpcallowip=192.168.1.0/24
disablewallet=0
# You must define either rpcauth or rpcuser/password (for ElectrumX)
rpcuser=user
rpcpassword=password
#rpccookiefile=.cookie
# Alternatively (more secure):
# rpcauth=papa:8e9a2b1d0c5f6e7d8c9a0b1c2d3e4f5$d3b07384d113edec49eaa6238ad5ff00
rest=1
# -----------------------------------------------------------
# 🌍 NETWORK CONFIGURATION
# -----------------------------------------------------------
listen=1                # Accept peer connections
port=8333               # P2P network port
maxconnections=8       # Limit number of peer connections





# Optional external IP if behind NAT
# externalip=

# Bind manually to interfaces (IPv4/IPv6)
# bind=0.0.0.0:9333

# -----------------------------------------------------------
# 🌐 PEERS / ADDNODES
# Add your fixed peers below (IPv4, IPv6, DNS, etc.)
